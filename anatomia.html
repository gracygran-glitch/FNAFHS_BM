        <div class="video-card" data-id="v3">
            <a href="https://www.youtube.com/watch?v=VIDEO_ID3" target="_blank">

</div>

<!-- ===== JS REAL (TOGGLE LIKE / DISLIKE) ===== -->
<script>
document.querySelectorAll(".video-card").forEach(card => {
    const id = card.dataset.id;

    const likeBtn = card.querySelector(".like-btn");
    const dislikeBtn = card.querySelector(".dislike-btn");

    let state = localStorage.getItem(id) || "none";

    const likeSpan = likeBtn.querySelector("span");
    const dislikeSpan = dislikeBtn.querySelector("span");

    function updateUI() {
        likeBtn.classList.remove("active");
        dislikeBtn.classList.remove("active");

        let likes = 0;
        let dislikes = 0;

        if (state === "like") {
            likeBtn.classList.add("active");
            likes = 1;
        } else if (state === "dislike") {
            dislikeBtn.classList.add("active");
            dislikes = 1;
        }

        likeSpan.textContent = likes;
        dislikeSpan.textContent = dislikes;
    }

    likeBtn.addEventListener("click", () => {
        state = (state === "like") ? "none" : "like";
        localStorage.setItem(id, state);
        updateUI();
    });

    dislikeBtn.addEventListener("click", () => {
        state = (state === "dislike") ? "none" : "dislike";
        localStorage.setItem(id, state);
        updateUI();
    });

    updateUI();
});
</script>

</body>
